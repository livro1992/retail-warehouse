<div
  class="ui-alert-dialog"
  [class.ui-alert-dialog--error]="data.type === 'error'"
  [class.ui-alert-dialog--warning]="data.type === 'warning'"
  [class.ui-alert-dialog--success]="data.type === 'success'"
  role="alertdialog"
  [attr.aria-labelledby]="'ui-alert-title'"
>
  <div class="ui-alert-dialog__main">
    <div class="ui-alert-dialog__accent" aria-hidden="true"></div>
    <mat-icon class="ui-alert-dialog__icon">{{ iconName() }}</mat-icon>
    <div class="ui-alert-dialog__copy">
      <h2 class="ui-alert-dialog__title" id="ui-alert-title">{{ titleText() }}</h2>
      <p class="ui-alert-dialog__message">{{ data.message }}</p>
    </div>
  </div>
  <div class="ui-alert-dialog__actions">
    @if (data.confirm) {
      <button type="button" mat-stroked-button (click)="close(false)">
        {{ cancelLabelText() }}
      </button>
      <button type="button" mat-flat-button color="primary" (click)="close(true)">
        {{ confirmLabelText() }}
      </button>
    } @else {
      <button type="button" mat-flat-button color="primary" (click)="close()">OK</button>
    }
  </div>
</div>
